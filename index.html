  friends: 'https://images.pexels.com/photos/34327735/pexels-photo-34327735.jpeg?auto=compress&cs=tinysrgb&h=650&w=940',
  toast: 'https://images.pexels.com/photos/636006/pexels-photo-636006.jpeg?auto=compress&cs=tinysrgb&h=650&w=940',
  garden: 'https://images.pexels.com/photos/16356687/pexels-photo-16356687.jpeg?auto=compress&cs=tinysrgb&h=650&w=940',
  bokeh: 'https://images.pexels.com/photos/9156491/pexels-photo-9156491.jpeg?auto=compress&cs=tinysrgb&h=650&w=940',
  bride: 'https://images.pexels.com/photos/35536264/pexels-photo-35536264.jpeg?auto=compress&cs=tinysrgb&h=650&w=940',
  dancing2: 'https://images.pexels.com/photos/15964962/pexels-photo-15964962.jpeg?auto=compress&cs=tinysrgb&h=650&w=940',
  candid: 'https://images.pexels.com/photos/12031113/pexels-photo-12031113.jpeg?auto=compress&cs=tinysrgb&h=650&w=940',
  couple: 'https://images.pexels.com/photos/36200504/pexels-photo-36200504.jpeg?auto=compress&cs=tinysrgb&h=650&w=940',

/* ── Modal ── */
const Modal = ({ open, tier, onClose }) => {
  const [name, setName] = useState('');
  const [email, setEmail] = useState('');
  const [done, setDone] = useState(false);

  useEffect(() => {
    const handler = e => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [onClose]);

  if (!open) return null;

  const submit = e => {
    e.preventDefault();
    if (!name || !email) return;
    setDone(true);
  };

  return (
    <div className="modal-overlay fixed inset-0 z-50 flex items-center justify-center px-4"
         style={{background: 'rgba(11,11,12,0.85)', backdropFilter: 'blur(8px)'}}
         onClick={onClose}>
      <div className="w-full max-w-md rounded-2xl border border-white/10 bg-smoke p-8 shadow-2xl"
           onClick={e => e.stopPropagation()}>
        {done ? (
          <div className="text-center py-4">
            <div className="text-4xl mb-4">🎉</div>
            <h3 className="font-bold text-xl mb-2">¡Listo!</h3>
            <p className="text-paper/60 text-sm">Te avisamos cuando LoDeAyer esté disponible. También puedes escribirnos por WhatsApp.</p>
            <a href="https://wa.me/51999999999?text=Hola,%20quiero%20crear%20mi%20evento%20con%20LoDeAyer"
               target="_blank"
               className="inline-block mt-5 rounded-full bg-[#25D366] text-white text-sm font-semibold px-6 py-2.5">
              Abrir WhatsApp
            </a>
          </div>
        ) : (
          <>
            <div className="flex items-start justify-between mb-6">
              <div>
                <h3 className="font-bold text-lg">Crear mi evento</h3>
                {tier && <p className="text-sm text-champagne mt-1">Plan: {tier}</p>}
              </div>
              <button onClick={onClose} className="text-paper/40 hover:text-paper text-xl leading-none">×</button>
            </div>
            <form onSubmit={submit} className="space-y-4">
              <div>
                <label className="block text-xs text-paper/50 mb-1.5 uppercase tracking-wider">Nombre</label>
                <input type="text" required value={name} onChange={e => setName(e.target.value)}
                       placeholder="Tu nombre"
                       className="w-full rounded-xl border border-white/10 bg-ink px-4 py-3 text-sm placeholder-paper/30 focus:outline-none focus:border-champagne/50 transition" />
              </div>
              <div>
                <label className="block text-xs text-paper/50 mb-1.5 uppercase tracking-wider">Email</label>
                <input type="email" required value={email} onChange={e => setEmail(e.target.value)}
                       placeholder="tu@email.com"
                       className="w-full rounded-xl border border-white/10 bg-ink px-4 py-3 text-sm placeholder-paper/30 focus:outline-none focus:border-champagne/50 transition" />
              </div>
              <button type="submit"
                      className="w-full rounded-full bg-paper text-ink font-bold py-3 text-sm hover:bg-white transition mt-2">
                Reservar mi lugar
              </button>
            </form>
            <div className="mt-4 text-center">
              <span className="text-xs text-paper/30">o </span>
              <a href="https://wa.me/51999999999?text=Hola,%20quiero%20crear%20mi%20evento%20con%20LoDeAyer"
                 target="_blank"
                 className="text-xs text-[#25D366] hover:underline">Prefiero WhatsApp</a>
            </div>
          </>
        )}
      </div>
    </div>
  );
};

/* ── Floating QR Widget ── */
const FakeQR = ({ size = 72 }) => {
  const n = 13, cells = [];
  for (let i = 0; i < n; i++) for (let j = 0; j < n; j++) {
    const corner = (i < 4 && j < 4) || (i < 4 && j > n - 5) || (i > n - 5 && j < 4);
    const on = corner ? ((i % 3 !== 1 || j % 3 !== 1) ? 1 : 0) : ((i * 7 + j * 13 + i * j) % 5 < 2 ? 1 : 0);
    if (on) cells.push(<rect key={i+'-'+j} x={j} y={i} width="0.92" height="0.92" fill="#0b0b0c" />);
  }
  return (
    <svg width={size} height={size} viewBox={`0 0 ${n} ${n}`} className="rounded-lg bg-white p-[2px] flex-shrink-0">
      {cells}
    </svg>
  );
};

    <div>

);
